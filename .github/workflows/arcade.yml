name: Generate arcade animation

on:
  schedule:
    - cron: "0 */12 * * *" # Executa a cada 12 horas no minuto 0

  workflow_dispatch: # Permite que você jogue manualmente nas Actions

  push:
    branches:
    - main

jobs:
  generate:
    permissions:
      contents: write # Permissão essencial para criar a branch pacman-output
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # Passo essencial que estava faltando: baixar o código do repositório
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: generate pacman-contribution-graph.svg
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          games: 'pacman'

      - name: push pacman-contribution-graph.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: pacman-output
          build_dir: . # MUDOU AQUI: O ponto indica que os arquivos estão na raiz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
